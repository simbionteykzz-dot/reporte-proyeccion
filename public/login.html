<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Iniciar sesión — Proyección Inventario</title>
  <link rel="icon" type="image/png" href="/assets/odooreport-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: var(--space-6); background: var(--color-bg); }
    .login-card { width: 100%; max-width: 400px; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-xl); padding: var(--space-8); box-shadow: var(--shadow-lg); }
    .login-brand { display: flex; justify-content: center; margin-bottom: var(--space-6); }
    .login-brand .brand-logo-wrap { padding: var(--space-3); border-radius: var(--radius-xl); background: #e4e4e7; }
    [data-theme="light"] .login-brand .brand-logo-wrap { background: #f4f4f5; }
    .login-brand .brand-logo { width: 88px; height: 88px; }
    .login-title { font-size: 1.25rem; font-weight: 600; text-align: center; margin-bottom: var(--space-2); letter-spacing: -0.02em; }
    .login-sub { font-size: 0.875rem; color: var(--color-text-muted); text-align: center; margin-bottom: var(--space-6); }
    .login-field { margin-bottom: var(--space-4); }
    .login-field label { display: block; font-size: 0.75rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-text-muted); margin-bottom: var(--space-2); }
    .login-input { width: 100%; min-height: 44px; padding: var(--space-3); border-radius: var(--radius-md); border: 1px solid var(--color-border); background: var(--color-surface-2); color: var(--color-text); font-size: 1rem; box-sizing: border-box; }
    .login-input:focus { outline: none; border-color: var(--color-accent); box-shadow: 0 0 0 3px var(--color-accent-subtle); }
    .login-error { color: var(--color-danger); font-size: 0.875rem; margin-top: var(--space-2); display: none; }
    .login-error.show { display: block; }
    .login-actions { margin-top: var(--space-6); }
    .login-actions .btn-primary { width: 100%; min-height: 44px; justify-content: center; }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-brand">
        <div class="brand-logo-wrap">
          <div class="brand-logo">
            <img src="/assets/odooreport-icon.png" alt="" width="88" height="88">
          </div>
        </div>
      </div>
      <h1 class="login-title">Proyección Inventario</h1>
      <p class="login-sub">Ingresa con tu correo y contraseña</p>
      <form id="login-form" novalidate>
        <div class="login-field">
          <label for="email">Correo</label>
          <input class="login-input" type="email" id="email" name="email" autocomplete="username" required>
        </div>
        <div class="login-field">
          <label for="password">Contraseña</label>
          <input class="login-input" type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <p class="login-error" id="login-error" role="alert"></p>
        <div class="login-actions">
          <button type="submit" class="btn btn-primary" id="login-submit">Entrar</button>
        </div>
      </form>
    </div>
  </div>
  <script>
(function () {
  var form = document.getElementById('login-form');
  var err = document.getElementById('login-error');
  var submit = document.getElementById('login-submit');
  form.addEventListener('submit', function (e) {
    e.preventDefault();
    err.classList.remove('show');
    err.textContent = '';
    submit.disabled = true;
    fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
      })
    }).then(function (r) {
      return r.json().then(function (j) { return { ok: r.ok, status: r.status, body: j }; });
    }).then(function (x) {
      if (x.ok && x.body && x.body.ok) {
        window.location.href = '/';
        return;
      }
      err.textContent = (x.body && x.body.error) ? x.body.error : 'No se pudo iniciar sesión';
      err.classList.add('show');
    }).catch(function () {
      err.textContent = 'Error de red. Intenta de nuevo.';
      err.classList.add('show');
    }).finally(function () {
      submit.disabled = false;
    });
  });
})();
  </script>
</body>
</html>
